version: '3.9'

# ─────────────────────────────────────────────────────────────────
# NOVUS Online Shop — Full Stack Docker Compose
#
# Services:
#   Infrastructure : postgres, redis, nats
#   Backend (gRPC) : user-service, product-service, order-service
#   Gateway (HTTP) : api-gateway  → :8080
#   Frontend       : frontend     → :3000  (Nginx SPA + API proxy)
# ─────────────────────────────────────────────────────────────────

networks:
  shop-net:
    driver: bridge

volumes:
  pgdata:
    name: novus_pgdata

# ─── Infrastructure ────────────────────────────────────────────────
services:


  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - shop-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"   # monitoring
    networks:
      - shop-net

# ─── Backend Microservices (gRPC) ──────────────────────────────────

  user-service:
    build:
      context: ./test-ap2/online-shop
      dockerfile: user-service/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:bekarys7@host.docker.internal:5432/online-shop?sslmode=disable
      NATS_URL:     nats://nats:4222
    ports:
      - "50051:50051"
    networks:
      - shop-net
    depends_on:
      nats:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  product-service:
    build:
      context: ./test-ap2/online-shop
      dockerfile: product-service/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:bekarys7@host.docker.internal:5432/online-shop?sslmode=disable
      REDIS_ADDR:   redis:6379
      NATS_URL:     nats://nats:4222
    ports:
      - "50052:50052"
    networks:
      - shop-net
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  order-service:
    build:
      context: ./test-ap2/online-shop
      dockerfile: order-service/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:bekarys7@host.docker.internal:5432/online-shop?sslmode=disable
      NATS_URL:     nats://nats:4222
    ports:
      - "50053:50053"
    networks:
      - shop-net
    depends_on:
      nats:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ─── API Gateway (HTTP → gRPC fan-out) ─────────────────────────────

  api-gateway:
    build:
      context: ./test-ap2/online-shop
      dockerfile: api-gateway/Dockerfile
    restart: unless-stopped
    environment:
      USER_SERVICE_URL:    user-service:50051
      PRODUCT_SERVICE_URL: product-service:50052
      ORDER_SERVICE_URL:   order-service:50053
    ports:
      - "8080:8080"
    networks:
      - shop-net
    depends_on:
      - user-service
      - product-service
      - order-service
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

# ─── Frontend (React + Nginx) ───────────────────────────────────────

  frontend:
    build:
      context: .          # d:\Golang\final test
      dockerfile: Dockerfile
      args:
        # API URL is nginx-local; nginx proxies /api/* → api-gateway:8080
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - shop-net
    depends_on:
      api-gateway:
        condition: service_healthy

  # ─── Observability (Prometheus, Grafana, Jaeger) ───────────────────────

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - shop-net
    depends_on:
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - shop-net
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686" # Jaeger Web UI
      - "4317:4317"   # OpenTelemetry gRPC receiver
    networks:
      - shop-net
