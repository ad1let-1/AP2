version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"

  user-service:
    build: 
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      - DATABASE_URL=postgres://postgres:bekarys7@host.docker.internal:5432/online-shop?sslmode=disable
      - NATS_URL=nats://nats:4222
    ports:
      - "50051:50051"
    depends_on:
      - nats
    extra_hosts:
      - "host.docker.internal:host-gateway"

  product-service:
    build: 
      context: .
      dockerfile: product-service/Dockerfile
    environment:
      - DATABASE_URL=postgres://postgres:bekarys7@host.docker.internal:5432/online-shop?sslmode=disable
      - REDIS_ADDR=redis:6379
      - NATS_URL=nats://nats:4222
    ports:
      - "50052:50052"
    depends_on:
      - redis
      - nats
    extra_hosts:
      - "host.docker.internal:host-gateway"

  order-service:
    build: 
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      - DATABASE_URL=postgres://postgres:bekarys7@host.docker.internal:5432/online-shop?sslmode=disable
      - NATS_URL=nats://nats:4222
    ports:
      - "50053:50053"
    depends_on:
      - nats
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    environment:
      - USER_SERVICE_URL=user-service:50051
      - PRODUCT_SERVICE_URL=product-service:50052
      - ORDER_SERVICE_URL=order-service:50053
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - order-service

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - api-gateway

  # ─── Observability (Prometheus, Grafana, Jaeger) ───────────────────────

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "16686:16686" # Jaeger Web UI
      - "4317:4317"   # OpenTelemetry gRPC receiver

volumes:
  pgdata:
