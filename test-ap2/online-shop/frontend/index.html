<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORW4RD | Lifestyle & Skateboard Store</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --muted: #666666;
            --accent: #2160ff;
            --border: #eeeeee;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

        /* Top Bar */
        .top-bar {
            background: #000; color: #fff; text-align: center;
            padding: 8px; font-size: 11px; letter-spacing: 1px; font-weight: 500;
        }

        /* Nav */
        header {
            border-bottom: 1px solid var(--border);
            padding: 20px 4%;
            background: #fff; position: sticky; top: 0; z-index: 100;
        }

        .nav-main { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 32px; font-weight: 800; letter-spacing: 5px; cursor: pointer; }
        .logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 25px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px;}
        .nav-links a { text-decoration: none; color: var(--text); transition: 0.2s; cursor: pointer; }
        .nav-links a:hover { color: var(--accent); }

        .nav-icons { display: flex; gap: 20px; align-items: center; }
        .nav-icons svg { width: 18px; height: 18px; cursor: pointer; }

        /* Hero */
        .hero { position: relative; width: 100%; height: 80vh; overflow: hidden; background: #000; }
        .hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .hero-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; width: 80%;
        }
        .hero-content h1 { font-size: 8vw; font-weight: 800; margin-bottom: 20px; line-height: 0.9; text-transform: uppercase; }
        .hero-content p { font-size: 20px; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; }

        /* Product Section */
        .section-container { padding: 60px 4%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }

        .card { text-decoration: none; color: inherit; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; aspect-ratio: 4/5; background: #f7f7f7; display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
        .card-info { padding: 15px 0; }
        .card-brand { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .card-title { font-size: 13px; font-weight: 400; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
        .card-price { font-size: 14px; font-weight: 700; }

        /* Banner Grid */
        .banner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: var(--border); margin-bottom: 40px;}
        .banner-item { height: 500px; position: relative; background: #000; display: flex; }
        .banner-img { width: 50%; height: 100%; object-fit: cover; }
        .banner-text { 
            width: 50%; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; color: #fff; padding: 40px;
        }
        .banner-text h2 { font-size: 40px; margin-bottom: 20px; font-weight: 700; }
        .btn-outline {
            border: 1px solid #fff; padding: 12px 30px; color: #fff; 
            text-transform: uppercase; font-size: 11px; font-weight: 600; 
            text-decoration: none; transition: 0.3s;
        }
        .btn-outline:hover { background: #fff; color: #000; }

        /* Overlay */
        .overlay {
            position: fixed; top: 0; right: -450px; width: 450px; height: 100vh;
            background: white; border-left: 1px solid var(--border);
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px; box-shadow: -10px 0 30px rgba(0,0,0,0.05);
        }
        .overlay.active { right: 0; }
        
        /* Auth */
        .modal-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; 
            align-items: center; z-index: 2000;
        }
        .modal { background: white; padding: 40px; width: 100%; max-width: 400px; }

        input {
            width: 100%; padding: 12px; border: 1px solid var(--border); 
            margin-bottom: 15px; font-size: 13px;
        }
        .btn-dark {
            width: 100%; padding: 15px; background: #000; color: #fff;
            border: none; font-weight: 700; font-size: 12px;
            text-transform: uppercase; cursor: pointer;
        }

        @media (max-width: 768px) {
            .banner-grid { grid-template-columns: 1fr; }
            .hero-content h1 { font-size: 12vw; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API = 'http://localhost:8080/api';

        const App = () => {
            const [view, setView] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isAuthOpen, setIsAuthOpen] = useState(false);
            const [user, setUser] = useState(null);
            const [token, setToken] = useState(localStorage.getItem('token'));

            useEffect(() => {
                fetchProducts();
                if (token) fetchMe();
            }, [token]);

            const fetchProducts = async () => {
                try {
                    const res = await fetch(`${API}/products?limit=12`);
                    const data = await res.json();
                    setProducts(data.products || []);
                } catch (e) { console.error(e); }
            };

            const fetchMe = async () => {
                try {
                    const res = await fetch(`${API}/users/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (res.ok) setUser(data.user);
                    else logout();
                } catch (e) { logout(); }
            };

            const logout = () => {
                localStorage.removeItem('token');
                setToken(null);
                setUser(null);
            };

            const addToCart = (p) => {
                setCart([...cart, p]);
                setIsCartOpen(true);
            };

            return (
                <div>
                    <div className="top-bar">WELCOME TO OUR STORE</div>
                    
                    <header>
                        <div className="nav-main">
                            <div className="logo" onClick={() => setView('home')}>FORW<span>4</span>RD</div>
                            <div className="nav-icons">
                                <svg onClick={() => setIsAuthOpen(true)} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                <svg onClick={() => setIsCartOpen(true)} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                                {user && <span style={{fontSize: '11px', fontWeight: '700'}}>{user.name.toUpperCase()}</span>}
                            </div>
                        </div>
                        <div className="nav-links">
                            <a>New In</a>
                            <a>Brands</a>
                            <a>Footwear</a>
                            <a>Clothing</a>
                            <a>Accessories</a>
                            <a>Skateboard</a>
                            <a style={{color: 'red'}}>Outlet</a>
                        </div>
                    </header>

                    {view === 'home' && (
                        <div>
                            <div className="hero">
                                <img src="https://images.unsplash.com/photo-1520116468816-95b69f847357?q=80&w=1974&auto=format&fit=crop" />
                                <div className="hero-content">
                                    <h1>Carhartt</h1>
                                    <p>Work in Progress</p>
                                </div>
                            </div>

                            <div className="section-container">
                                <div className="grid">
                                    {products.map(p => (
                                        <div key={p.id} className="card" onClick={() => addToCart(p)}>
                                            <div className="card-img">👕</div>
                                            <div className="card-info">
                                                <div className="card-brand">{p.category_id || 'Premium'}</div>
                                                <div className="card-title">{p.name}</div>
                                                <div className="card-price">{p.price.toLocaleString()} KZT</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="banner-grid">
                                <div className="banner-item">
                                    <img className="banner-img" src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?q=80&w=1974&auto=format&fit=crop" />
                                    <div className="banner-text">
                                        <h2>New Balance</h2>
                                        <a className="btn-outline">Shop Now</a>
                                    </div>
                                </div>
                                <div className="banner-item">
                                    <div className="banner-text">
                                        <h2>Former</h2>
                                        <a className="btn-outline">Shop Now</a>
                                    </div>
                                    <img className="banner-img" src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=2070&auto=format&fit=crop" />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Cart Drawer */}
                    <div className={`overlay ${isCartOpen ? 'active' : ''}`}>
                        <div style={{display:'flex', justifyContent:'space-between', marginBottom:'40px'}}>
                            <h2>Cart</h2>
                            <button onClick={() => setIsCartOpen(false)} style={{background:'none', border:'none', fontSize:'24px', cursor:'pointer'}}>✕</button>
                        </div>
                        {cart.length === 0 ? <p>Your cart is empty.</p> : (
                            <div>
                                {cart.map((item, idx) => (
                                    <div key={idx} style={{display:'flex', gap:'15px', marginBottom:'20px', borderBottom:'1px solid #eee', paddingBottom:'15px'}}>
                                        <div style={{width:'60px', height:'60px', background:'#f7f7f7', display:'flex', alignItems:'center', justifyCenter:'center'}}>👕</div>
                                        <div>
                                            <div style={{fontSize:'12px', fontWeight:'700'}}>{item.name}</div>
                                            <div style={{fontSize:'12px'}}>{item.price.toLocaleString()} KZT</div>
                                        </div>
                                    </div>
                                ))}
                                <button className="btn-dark" style={{marginTop:'20px'}}>Checkout</button>
                            </div>
                        )}
                    </div>

                    {/* Auth Modal */}
                    <div className="modal-bg" style={{display: isAuthOpen ? 'flex' : 'none'}}>
                        <div className="modal">
                            <h2 style={{marginBottom:'20px'}}>Login</h2>
                            <input type="email" placeholder="Email" id="login-email" />
                            <input type="password" placeholder="Password" id="login-pass" />
                            <button className="btn-dark" onClick={() => setIsAuthOpen(false)}>Sign In</button>
                            <button onClick={() => setIsAuthOpen(false)} style={{marginTop:'15px', background:'none', border:'none', color:'#666', fontSize:'11px', cursor:'pointer', width:'100%'}}>Cancel</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
