syntax = "proto3";

package pb;
option go_package = "./pb";

service ProductService {
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc GetProductByID(GetProductByIDRequest) returns (GetProductByIDResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc SearchProducts(SearchProductsRequest) returns (SearchProductsResponse);
  
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc GetCategory(GetCategoryRequest) returns (GetCategoryResponse);
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
  rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse);
  
  rpc UpdateStock(UpdateStockRequest) returns (UpdateStockResponse);
  rpc GetProductReviews(GetProductReviewsRequest) returns (GetProductReviewsResponse);
}

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int32 stock = 5;
  string category_id = 6;
}

message Category {
  string id = 1;
  string name = 2;
}

message Review {
  string id = 1;
  string user_id = 2;
  string product_id = 3;
  int32 rating = 4;
  string comment = 5;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  double price = 3;
  int32 stock = 4;
  string category_id = 5;
}
message CreateProductResponse { Product product = 1; }

message GetProductByIDRequest { string id = 1; }
message GetProductByIDResponse { Product product = 1; }

message UpdateProductRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  string category_id = 5;
}
message UpdateProductResponse { Product product = 1; }

message DeleteProductRequest { string id = 1; }
message DeleteProductResponse { bool success = 1; }

message ListProductsRequest {
  int32 page = 1;
  int32 limit = 2;
}
message ListProductsResponse {
  repeated Product products = 1;
  int32 total = 2;
}

message SearchProductsRequest {
  string query = 1;
  int32 page = 2;
  int32 limit = 3;
}
message SearchProductsResponse {
  repeated Product products = 1;
  int32 total = 2;
}

message CreateCategoryRequest { string name = 1; }
message CreateCategoryResponse { Category category = 1; }

message GetCategoryRequest { string id = 1; }
message GetCategoryResponse { Category category = 1; }

message ListCategoriesRequest {}
message ListCategoriesResponse { repeated Category categories = 1; }

message DeleteCategoryRequest { string id = 1; }
message DeleteCategoryResponse { bool success = 1; }

message UpdateStockRequest {
  string product_id = 1;
  int32 quantity = 2;
}
message UpdateStockResponse { bool success = 1; }

message GetProductReviewsRequest { string product_id = 1; }
message GetProductReviewsResponse { repeated Review reviews = 1; }
