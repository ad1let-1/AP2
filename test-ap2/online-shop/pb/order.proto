syntax = "proto3";

package pb;
option go_package = "./pb";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrderByID(GetOrderByIDRequest) returns (GetOrderByIDResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc GetPaymentStatus(GetPaymentStatusRequest) returns (GetPaymentStatusResponse);
  
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
  rpc TrackOrder(TrackOrderRequest) returns (TrackOrderResponse);
  
  rpc ApplyDiscount(ApplyDiscountRequest) returns (ApplyDiscountResponse);
  rpc CalculateTotal(CalculateTotalRequest) returns (CalculateTotalResponse);
  
  rpc AddItemToOrder(AddItemToOrderRequest) returns (AddItemToOrderResponse);
  rpc RemoveItemFromOrder(RemoveItemFromOrderRequest) returns (RemoveItemFromOrderResponse);
}

message OrderItem {
  string product_id = 1;
  int32 quantity = 2;
  double price = 3;
}

message Order {
  string id = 1;
  string user_id = 2;
  repeated OrderItem items = 3;
  double total_amount = 4;
  string status = 5;
  string created_at = 6;
}

message CreateOrderRequest {
  string user_id = 1;
  repeated OrderItem items = 2;
}
message CreateOrderResponse { Order order = 1; }

message GetOrderByIDRequest { string id = 1; }
message GetOrderByIDResponse { Order order = 1; }

message ListOrdersRequest {
  string user_id = 1;
  int32 page = 2;
  int32 limit = 3;
}
message ListOrdersResponse {
  repeated Order orders = 1;
  int32 total = 2;
}

message CancelOrderRequest { string id = 1; }
message CancelOrderResponse { bool success = 1; }

message CreatePaymentRequest {
  string order_id = 1;
  string payment_method = 2;
}
message CreatePaymentResponse {
  string payment_id = 1;
  string status = 2;
}

message GetPaymentStatusRequest { string payment_id = 1; }
message GetPaymentStatusResponse { string status = 1; }

message UpdateOrderStatusRequest {
  string order_id = 1;
  string status = 2;
}
message UpdateOrderStatusResponse { bool success = 1; }

message TrackOrderRequest { string order_id = 1; }
message TrackOrderResponse { string tracking_info = 1; }

message ApplyDiscountRequest {
  string order_id = 1;
  string discount_code = 2;
}
message ApplyDiscountResponse {
  Order order = 1;
  double new_total = 2;
}

message CalculateTotalRequest {
  repeated OrderItem items = 1;
  string discount_code = 2;
}
message CalculateTotalResponse { double total_amount = 1; }

message AddItemToOrderRequest {
  string order_id = 1;
  OrderItem item = 2;
}
message AddItemToOrderResponse { Order order = 1; }

message RemoveItemFromOrderRequest {
  string order_id = 1;
  string product_id = 2;
}
message RemoveItemFromOrderResponse { Order order = 1; }
